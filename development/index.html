<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
	<title>Luisfdonavarrete.GitHub.io by luisfdonavarrete</title>
	<!-- Bootstrap -->
	<link href="assets/css/styles.css" rel="stylesheet">
	<!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
	<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
	<!--[if lt IE 9]>
			<script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
			<script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
		<![endif]-->
</head>

<body data-spy="scroll" data-target="#navbar-page">
	<nav id="navbar-page" class="navbar navbar-fixed-top navbar-color">
		<div class="container-fluid">
			<div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
				<ul class="nav navbar-nav navbar-right">
					<li>
						<a href="#about">ABOUT</a>
					</li>
					<li>
						<a href="#portfolio">PORTFOLIO</a>
					</li>
					<li>
						<a href="#contact">CONTACT</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<section id="about">
		<div class="container">
			<div class="row">
				<div class="col-xs-12 col-md-offset-1 col-md-10 text-center">
					<img class="img-circle" data-bind="attr: { src: picture, alt: name }">
					<h1 class="margin-top-0" data-bind="text: name"></h1>
					<h4 class="margin-top-0" data-bind="text: role"></h4>
					<hr>
					<p class="summary" data-bind="text: summary"></p>
				</div>
			</div>
		</div>
	</section>
	<section id="portfolio">
		<div class="container">
			<h2 class="portfolio text-center">Portfolio</h2>
			<div class="row">
				<div class="col-sm-8 col-sm-offset-2 col-xs-12">
					<div class="row text-center" data-bind="foreach: projects">
						<div class="col-sm-6 col-xs-12">
							<h3 class="text-center project-name" data-bind="text: name"></h3>
							<div class="project-entry" data-bind="click: $parent.showModal">								
								<img class="img-responsive" data-bind="attr: { src: image, alt: name }">
								<div class="overlay">
									<div class="project-title">
										<h3 data-bind="text: name"></h3>
										<i class="glyphicon glyphicon-zoom-in"></i>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<section id="contact">
		<div class="container text-center">
			<h3>Contact</h3>
			<span data-bind="foreach: contactLinks">
				<a target="_blank" data-bind="attr: { href: link}">
					<img data-bind="attr: {src : icon, alt: name}">
				</a>
			</span>
		</div>
	</section>
	<div class="modal fade" id="portfolio-modal" tabindex="-1" role="dialog">

	</div>
	<script type="text/template" id="modal-template">
		<div class="modal-dialog" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" aria-label="Close">
						<span aria-hidden="true">&times;</span>
					</button>
					<h4 class="modal-title"><%= name %></h4>
				</div>
				<div class="modal-body">
					<img src="<%= image %>" alt="<%= name %>" class="img-responsive">
					<p class="text-justify project-description">
						<%= description %>
					</p>
					<p class="text-center">
						<a class="btn btn-default project-links" href="#" role="button">
							<img src="assets/img/GitHub-Mark-Light-32px.png" alt="github link"> Code
						</a>
						<a class="btn btn-default project-links" href="#" role="button">
							Live Project
						</a>
					</p>
				</div>
			</div>
		</div>
	</script>
	<script src="assets/js/app.js"></script>
</body>

</html>
