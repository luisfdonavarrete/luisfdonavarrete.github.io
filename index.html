<body class="menu-hidden" data-spy="scroll" data-target="#navbar-page">
	<nav id="navbar-page" class="navbar navbar-fixed-top navbar-color">
		<div class="container-fluid">
			<div class="navbar-header visible-xs-block">
				<a class="navbar-brand" href="#">
					<i class="fa fa-bars"></i>
				</a>
			</div>
			<div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
				<ul class="nav navbar-nav navbar-right">
					<li>
						<a href="#about">ABOUT</a>
					</li>
					<li>
						<a href="#portfolio">PORTFOLIO</a>
					</li>
					<li>
						<a href="#contact">CONTACT</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<nav class="side-menu visible-xs-block">
		<ul class="">
			<li>
				<a href="#about">ABOUT</a>
			</li>
			<li>
				<a href="#portfolio">PORTFOLIO</a>
			</li>
			<li>
				<a href="#contact">CONTACT</a>
			</li>
		</ul>
	</nav>
	<section id="about">
		<div class="container">
			<div class="row">
				<div class="col-xs-12 col-md-offset-1 col-md-10 text-center">
					<img class="img-circle" data-bind="attr: { src: picture, alt: name }">
					<h1 class="margin-top-0" data-bind="text: name"></h1>
					<h4 class="margin-top-0" data-bind="text: role"></h4>
					<hr>
					<p class="summary" data-bind="text: summary"></p>
				</div>
			</div>
		</div>
	</section>
	<section id="portfolio">
		<div class="container">
			<h2 class="portfolio text-center">Portfolio</h2>
			<div class="row">
				<div class="col-sm-8 col-sm-offset-2 col-xs-12">
					<div class="row text-center" data-bind="foreach: projects">
						<div class="col-sm-6 col-xs-12">
							<h3 class="text-center project-name" data-bind="text: name"></h3>
							<div class="project-entry" data-bind="click: $parent.showModal">
								<img class="img-responsive" data-bind="attr: { src: image, alt: name }">
								<div class="overlay">
									<div class="project-title">
										<h3 data-bind="text: name"></h3>
										<i class="glyphicon glyphicon-zoom-in"></i>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<section id="contact">
		<div class="container text-center">
			<h3>Contact</h3>
			<span data-bind="foreach: contactLinks">	
				<a class="contact-item" target="_blank" data-bind="attr: { href: link}">
					<i data-bind="attr: { class: icon }"></i>
				</a>
			</span>
		</div>
	</section>
	<div class="modal fade" id="portfolio-modal" tabindex="-1" role="dialog">

	</div>
	<script type="text/template" id="modal-template">
		<div class="modal-dialog" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" aria-label="Close">
						<span aria-hidden="true">&times;</span>
					</button>
					<h4 class="modal-title"><%= name %></h4>
				</div>
				<div class="modal-body">
					<img src="<%= image %>" alt="<%= name %>" class="img-responsive">
					<p class="text-justify project-description">
						<%= description %>
					</p>
					<p class="text-center">
						<a target="_blank" class="btn btn-default project-links" href="<%= github %>" role="button">
							<i class="fa fa-github"></i> Code
						</a>
						<a target="_blank" class="btn btn-default project-links" href="<%= url %>" role="button">
							<i class="fa fa-code"></i> Live Project
						</a>
					</p>
				</div>
			</div>
		</div>
	</script>
	<script src="assets/js/app.min.js"></script>
</body>

</html>
